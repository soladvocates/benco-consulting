                        </div>
                        <div
                          style={{
                            padding: "8px 10px",
                            borderRadius: "999px",
                            background: "rgba(15,74,162,0.08)",
                            color: palette.navy,
                            fontWeight: 700,
                            fontSize: "13px"

                          {service.duration}

                      </div>
                      <p style={{ fontSize: "16px", lineHeight: 1.7, color: palette.text, margin: 0 }}>
                        {service.description}

                    </div>
                  ))}
                </div>
              </div>
            </section>

            <section id="process" style={{ padding: "32px 0 24px" }}>
              <div style={containerStyle}>
                <div

                    padding: "34px",
                    background: `linear-gradient(180deg, ${palette.ink} 0%, ${palette.navy} 100%)`,

                  }}
                >
                  <div
                    style={{
                      fontSize: "13px",
                      fontWeight: 700,
                      letterSpacing: "0.12em",
                      textTransform: "uppercase",

                    style={{
                      fontSize: "clamp(30px, 4vw, 48px)",

                  </h2>

                  <div
                    className="process-grid"
                    style={{
                      display: "grid",
                      gridTemplateColumns: "repeat(4, minmax(0, 1fr))",

                      <div

                          padding: "22px",

                            fontSize: "13px",

                        <div
                          style={{

                            lineHeight: 1.15

                        </div>
                        <div
                          style={{
                            marginTop: "12px",
                            lineHeight: 1.7,
                            color: "rgba(255,255,255,0.84)"

                      fontWeight: 700,
                      letterSpacing: "0.12em",
                      textTransform: "uppercase",
                      color: palette.navy,
                      marginBottom: "12px"
                    }}

                    {t.founderEyebrow}
                  </div>

                  <div
                    className="founder-grid"
                    style={{
                      display: "grid",
                      gridTemplateColumns: "300px 1fr",
                      gap: "28px",
                      alignItems: "center"

                        padding: "28px",
                        borderRadius: "24px",
                        background: "linear-gradient(180deg, rgba(102,121,154,0.16) 0%, rgba(15,74,162,0.12) 100%)",
                        border: `1px solid ${palette.border}`

                      <div
                        style={{
                          width: "98px",
                          height: "98px",
                          borderRadius: "26px",
                          background: palette.navy,

                          boxShadow: "0 12px 24px rgba(15,74,162,0.22)"

                      <div

                          marginTop: "18px",

                          fontWeight: 800,

                      <div style={{ marginTop: "10px", color: palette.text, fontWeight: 700 }}>

                    <div>
                      <p style={{ fontSize: "17px", lineHeight: 1.8, color: palette.text }}>
                        {t.founderText}
                      </p>

                      <div
                        style={{
                          marginTop: "20px",
                          padding: "20px 22px",
                          borderRadius: "22px",
                          background: palette.ivory,
                          border: `1px solid ${palette.border}`,
                          fontSize: "24px",
                          color: palette.ink,
                          fontWeight: 700,
                          lineHeight: 1.4
                        }}
                      >
                        “{t.founderQuote}”
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </section>

            <section id="contact" style={{ padding: "26px 0 64px" }}>

                <div
                  style={{
                    ...cardStyle,
                    padding: "34px",
                    background: `linear-gradient(180deg, #ffffff 0%, ${palette.ivory} 100%)`
                  }}
                >
                  <div
                    style={{
                      fontSize: "13px",
                      fontWeight: 700,
                      letterSpacing: "0.12em",
                      textTransform: "uppercase",
                      color: palette.navy,
                      marginBottom: "12px"
                    }}
                  >
                    {t.contactEyebrow}
                  </div>

                  <div
                    className="contact-grid"
                    style={{
                      display: "grid",
                      gridTemplateColumns: "1.1fr 0.9fr",
                      gap: "24px",
                      alignItems: "start"
                    }}
                  >
                    <div>
                      <h2
                        style={{
                          fontSize: "clamp(30px, 4vw, 48px)",
                          lineHeight: 1.05,
                          margin: 0,
                          color: palette.ink

                        {t.contactTitle}
                      </h2>

                      <p
                        style={{
                          marginTop: "16px",
                          maxWidth: "680px",
                          fontSize: "17px",
                          lineHeight: 1.8,
                          color: palette.text
                        }}
                      >
                        {t.contactText}
                      </p>

                      <div style={{ display: "flex", gap: "14px", flexWrap: "wrap", marginTop: "24px" }}>

                            padding: "15px 22px",

                            boxShadow: "0 10px 24px rgba(15,74,162,0.22)"
                          }}

                        </a>

                        <a
                          href="https://www.linkedin.com/company/benco-consulting/"

                          rel="noreferrer"

                            textDecoration: "none",
                            padding: "15px 22px",
                            borderRadius: "14px",
                            background: "#fff",
                            color: palette.navy,
                            fontWeight: 700,
                            border: `1px solid ${palette.border}`

                          {t.socialValue}

                    <div style={{ display: "grid", gap: "14px" }}>
                      {[
                        [t.addressLabel, t.addressValue],
                        [t.phoneLabel, t.phoneValue],
                        [t.hoursLabel, t.hoursValue],
                        [t.socialLabel, t.socialValue]
                      ].map(([label, value]) => (
                        <div
                          key={label}
                          style={{
                            padding: "18px",
                            borderRadius: "18px",
                            background: "#fff",
                            border: `1px solid ${palette.border}`
                          }}
                        >
                          <div
                            style={{
                              fontSize: "12px",
                              fontWeight: 800,
                              letterSpacing: "0.12em",
                              textTransform: "uppercase",
                              color: "#66799a",
                              marginBottom: "6px"
                            }}
                          >
                            {label}
                          </div>
                          <div style={{ fontSize: "18px", color: palette.ink, fontWeight: 700 }}>
                            {value}
                          </div>
                        </div>
                      ))}
                    </div>
                  </div>
                </div>
              </div>

            <footer
              style={{
                borderTop: `1px solid ${palette.border}`,
                background: "rgba(255,255,255,0.78)"

              <div
                style={{
                  ...containerStyle,
                  paddingTop: "24px",
                  paddingBottom: "30px",
                  display: "flex",
                  justifyContent: "space-between",
                  gap: "18px",
                  flexWrap: "wrap"
                }}
              >
                <div>
                  <div style={{ fontWeight: 800, color: palette.ink }}>BENCO CONSULTING LLC</div>
                  <div style={{ color: palette.text, marginTop: "6px" }}>{t.footerText}</div>

                <div style={{ maxWidth: "520px", color: "#66799a", fontSize: "14px", lineHeight: 1.6 }}>

            <style>{`
              @media (max-width: 980px) {
                .hero-grid,
                .about-grid,
                .founder-grid,
                .contact-grid {
                  grid-template-columns: 1fr !important;
                }

                .process-grid {
                  grid-template-columns: 1fr 1fr !important;
                }
              }

              @media (max-width: 720px) {
                .services-grid,
                .process-grid {
                  grid-template-columns: 1fr !important;
                }
              }
            `}</style>
          </div>
        );

      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(<App />);
